<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vernissage — Main Loop</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #d5c7ef;
    }
    #host {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    .art-frame {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }
  </style>
</head>
<body>
  <main id="host"></main>
  <script src="orchestrator.js"></script>
</body>
</html>
