<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>broken dream</title>
  <style>
    :root {
      color-scheme: light;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at top, rgba(255, 255, 255, 0.38), transparent 38%),
        linear-gradient(180deg, #ddd1f6 0%, #c8e2f5 100%);
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    canvas {
      display: block;
      box-shadow:
        0 24px 80px rgba(93, 64, 146, 0.18),
        0 0 0 1px rgba(255, 255, 255, 0.25);
    }
  </style>
</head>
<body>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.1/p5.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/ml5@1.3.1/dist/ml5.min.js"></script>
  <script src="../broken_dream/input.js"></script>
  <script src="../broken_dream/scene.js"></script>
  <script src="../broken_dream/sketch.js"></script>
