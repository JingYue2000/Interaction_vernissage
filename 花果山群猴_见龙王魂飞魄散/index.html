<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snippet Wrapper</title>
  <style>
    :root {
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #050505;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    }

    canvas {
      width: min(100vw, 1400px);
      height: auto;
      background: #000;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
      image-rendering: pixelated;
    }
  </style>
</head>
<body>
  <canvas id="c" width="2000" height="1200"></canvas>
  <script src="u.js"></script>
</body>
</html>
